controller_manager:
  ros__parameters:
    update_rate: 500
    ur3e_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    gripper_controller:
      type: position_controllers/GripperActionController
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
ur3e_arm_controller:
  ros__parameters:
    joints:
      - ur3e_shoulder_pan_joint
      - ur3e_shoulder_lift_joint
      - ur3e_elbow_joint
      - ur3e_wrist_1_joint
      - ur3e_wrist_2_joint
      - ur3e_wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    open_loop_control: true
    allow_integration_in_goal_trajectories: true
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.6
      ur3e_shoulder_pan_joint:
        trajectory: 0.2
        goal: 0.1
      ur3e_shoulder_lift_joint:
        trajectory: 0.2
        goal: 0.1
      ur3e_elbow_joint:
        trajectory: 0.2
        goal: 0.1
      ur3e_wrist_1_joint:
        trajectory: 0.2
        goal: 0.1
      ur3e_wrist_2_joint:
        trajectory: 0.2
        goal: 0.1
      ur3e_wrist_3_joint:
        trajectory: 0.2
        goal: 0.1
gripper_controller:
  ros__parameters:
    joint: robotiq_hande_left_finger_joint
    action_monitor_rate: 20.0
    goal_tolerance: 0.01
    max_effort: 130.0
    allow_stalling: false
    stall_velocity_threshold: 0.001
    stall_timeout: 1.0
joint_state_broadcaster:
  ros__parameters:
    joints:
      - ur3e_shoulder_pan_joint
      - ur3e_shoulder_lift_joint
      - ur3e_elbow_joint
      - ur3e_wrist_1_joint
      - ur3e_wrist_2_joint
      - ur3e_wrist_3_joint
      - robotiq_hande_left_finger_joint
      - robotiq_hande_right_finger_joint